name: Release

on:
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

env:
  APP_NAME: sqlite-mcp-rs

jobs:
  version:
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive

      - id: version
        shell: bash
        run: |
          set -euo pipefail

          VERSION=$(awk '
            $0 ~ /^\[package\]$/ { in_package=1; next }
            $0 ~ /^\[/ { in_package=0 }
            in_package && $0 ~ /^version = / {
              gsub(/version = "|"/, "", $0)
              print $0
              exit
            }
          ' Cargo.toml)

          if [ -z "$VERSION" ]; then
            echo "Failed to read [package].version from Cargo.toml"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

  validate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test

  build-release-artifacts:
    needs:
      - version
      - validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            rust_target: aarch64-apple-darwin
            binary_name: sqlite-mcp-rs
            can_smoke: "true"
            use_zigbuild: "false"
          - runner: macos-15-intel
            rust_target: x86_64-apple-darwin
            binary_name: sqlite-mcp-rs
            can_smoke: "true"
            use_zigbuild: "false"
          - runner: windows-2022
            rust_target: x86_64-pc-windows-msvc
            binary_name: sqlite-mcp-rs.exe
            can_smoke: "true"
            use_zigbuild: "false"
          - runner: windows-2022
            rust_target: aarch64-pc-windows-msvc
            binary_name: sqlite-mcp-rs.exe
            can_smoke: "false"
            use_zigbuild: "false"
          - runner: ubuntu-24.04
            rust_target: x86_64-unknown-linux-musl
            binary_name: sqlite-mcp-rs
            can_smoke: "true"
            use_zigbuild: "true"
          - runner: ubuntu-24.04-arm
            rust_target: aarch64-unknown-linux-musl
            binary_name: sqlite-mcp-rs
            can_smoke: "true"
            use_zigbuild: "true"
    runs-on: ${{ matrix.runner }}
    env:
      CFLAGS: -Du_int8_t=uint8_t -Du_int16_t=uint16_t -Du_int64_t=uint64_t
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Zig
        if: ${{ matrix.use_zigbuild == 'true' }}
        uses: mlugg/setup-zig@v2

      - name: Install cargo-zigbuild
        if: ${{ matrix.use_zigbuild == 'true' }}
        uses: taiki-e/install-action@cargo-zigbuild

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build binary
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ matrix.use_zigbuild }}" = "true" ]; then
            cargo zigbuild --release --features vector --target ${{ matrix.rust_target }}
          else
            cargo build --release --features vector --target ${{ matrix.rust_target }}
          fi

      - name: Smoke test binary
        if: ${{ matrix.can_smoke == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          "./target/${{ matrix.rust_target }}/release/${{ matrix.binary_name }}" --help >/dev/null

      - name: Package archive
        shell: bash
        run: |
          set -euo pipefail
          python scripts/package_release.py \
            --target-triple "${{ matrix.rust_target }}" \
            --binary "./target/${{ matrix.rust_target }}/release/${{ matrix.binary_name }}" \
            --output-dir release

      - name: Upload packaged archive
        uses: actions/upload-artifact@v6
        with:
          name: release-${{ matrix.rust_target }}
          path: release/*

  package-npm:
    needs:
      - version
      - build-release-artifacts
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Download release archives
        uses: actions/download-artifact@v7
        with:
          pattern: release-*
          path: release
          merge-multiple: true

      - name: Build npm tarballs
        shell: bash
        run: |
          set -euo pipefail
          python scripts/build_npm_packages.py \
            --version "${{ needs.version.outputs.version }}" \
            --artifacts-dir release \
            --output-dir npm-dist

      - name: Upload npm tarballs
        uses: actions/upload-artifact@v6
        with:
          name: npm-dist
          path: npm-dist/*

  smoke-npm-native:
    needs:
      - package-npm
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            alias_name: "@bradsjm/sqlite-mcp-rs-darwin-arm64"
          - runner: macos-15-intel
            alias_name: "@bradsjm/sqlite-mcp-rs-darwin-x64"
          - runner: windows-2022
            alias_name: "@bradsjm/sqlite-mcp-rs-win32-x64"
          - runner: ubuntu-24.04
            alias_name: "@bradsjm/sqlite-mcp-rs-linux-x64"
          - runner: ubuntu-24.04-arm
            alias_name: "@bradsjm/sqlite-mcp-rs-linux-arm64"
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Download npm tarballs
        uses: actions/download-artifact@v7
        with:
          name: npm-dist
          path: npm-dist

      - name: Resolve tarball names
        shell: bash
        run: |
          set -euo pipefail
          META_TARBALL=$(node -e 'const fs=require("fs"); const manifest=JSON.parse(fs.readFileSync("npm-dist/manifest.json","utf8")); console.log(manifest.meta_package.path);')
          PLATFORM_TARBALL=$(node -e 'const fs=require("fs"); const manifest=JSON.parse(fs.readFileSync("npm-dist/manifest.json","utf8")); const aliasName=process.argv[1]; const entry=manifest.platform_packages.find((item)=>item.alias_name===aliasName); if(!entry){process.exit(1)} console.log(entry.path);' "${{ matrix.alias_name }}")
          echo "META_TARBALL=$META_TARBALL" >> "$GITHUB_ENV"
          echo "PLATFORM_TARBALL=$PLATFORM_TARBALL" >> "$GITHUB_ENV"
          echo "ALIAS_NAME=${{ matrix.alias_name }}" >> "$GITHUB_ENV"

      - name: Run npm smoke test
        shell: bash
        run: |
          set -euo pipefail
          mkdir smoke
          cd smoke
          npm init -y >/dev/null 2>&1
          npm install "../npm-dist/${META_TARBALL}" >/dev/null
          mkdir -p "node_modules/${ALIAS_NAME}"
          tar -xzf "../npm-dist/${PLATFORM_TARBALL}" -C "node_modules/${ALIAS_NAME}" --strip-components=1
          npx --no-install sqlite-mcp-rs --help >/dev/null

  publish:
    needs:
      - version
      - build-release-artifacts
      - package-npm
      - smoke-npm-native
    runs-on: ubuntu-24.04
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download release archives
        uses: actions/download-artifact@v7
        with:
          pattern: release-*
          path: release
          merge-multiple: true

      - name: Download npm tarballs
        uses: actions/download-artifact@v7
        with:
          name: npm-dist
          path: npm-dist

      - name: Write checksums
        shell: bash
        run: |
          set -euo pipefail
          python scripts/write_checksums.py --dist-dir release

      - name: Verify expected release files
        shell: bash
        run: |
          set -euo pipefail
          for path in \
            release/sqlite-mcp-rs-aarch64-apple-darwin.tar.xz \
            release/sqlite-mcp-rs-x86_64-apple-darwin.tar.xz \
            release/sqlite-mcp-rs-x86_64-pc-windows-msvc.zip \
            release/sqlite-mcp-rs-aarch64-pc-windows-msvc.zip \
            release/sqlite-mcp-rs-x86_64-unknown-linux-musl.tar.xz \
            release/sqlite-mcp-rs-aarch64-unknown-linux-musl.tar.xz \
            release/sha256.sum; do
            [ -f "$path" ] || { echo "Missing expected release file: $path"; exit 1; }
          done

      - name: Write release notes
        shell: bash
        run: |
          set -euo pipefail
          cat > release-notes.md <<EOF
          ${APP_NAME} ${{ needs.version.outputs.version }}

          Supported binaries:
          - macOS: Apple Silicon and Intel
          - Windows: x64 and arm64
          - Linux: x64 and arm64 via musl builds

          Docker images:
          - linux/amd64
          - linux/arm64
          EOF

      - name: Create GitHub release
        shell: bash
        run: |
          set -euo pipefail
          gh release create "${{ needs.version.outputs.tag }}" \
            --target "${{ github.sha }}" \
            --title "${{ needs.version.outputs.tag }}" \
            --notes-file release-notes.md \
            release/*

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Publish npm packages
        shell: bash
        run: |
          set -euo pipefail
          node - <<'NODE'
          const fs = require("fs");
          const { spawnSync } = require("child_process");
          const manifest = JSON.parse(fs.readFileSync("npm-dist/manifest.json", "utf8"));
          const tarballs = [
            ...manifest.platform_packages.map((entry) => entry.path),
            manifest.meta_package.path,
          ];
          for (const tarball of tarballs) {
            const result = spawnSync("npm", ["publish", "--access", "public", "--provenance", `./npm-dist/${tarball}`], {
              stdio: "inherit",
            });
            if (result.status !== 0) {
              process.exit(result.status ?? 1);
            }
          }
          NODE
