name: Release

on:
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

env:
  APP_NAME: sqlite-mcp-rs
  ZIG_VERSION: 0.15.2

jobs:
  version:
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive

      - id: version
        shell: bash
        run: |
          set -euo pipefail

          VERSION=$(awk '
            $0 ~ /^\[package\]$/ { in_package=1; next }
            $0 ~ /^\[/ { in_package=0 }
            in_package && $0 ~ /^version = / {
              gsub(/version = "|"/, "", $0)
              print $0
              exit
            }
          ' Cargo.toml)

          if [ -z "$VERSION" ]; then
            echo "Failed to read [package].version from Cargo.toml"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive
      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install pinned npm
        run: npm install --global npm@12.0.1

      - name: Test npm launcher
        run: node scripts/test-npm-launcher.js

      - name: Test npm package generation
        run: python scripts/test_build_npm_packages.py


      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Test default features
        run: cargo test --locked

      - name: Test vector feature
        run: cargo test --locked --features vector

      - name: Test all features
        run: cargo test --locked --all-features

  build-release-artifacts:
    needs:
      - version
      - validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            rust_target: aarch64-apple-darwin
            build_target: aarch64-apple-darwin
            binary_name: sqlite-mcp-rs
            can_smoke: "true"
            use_zigbuild: "false"
            cargo_features: "vector local-embeddings"
          - runner: macos-15-intel
            rust_target: x86_64-apple-darwin
            build_target: x86_64-apple-darwin
            binary_name: sqlite-mcp-rs
            can_smoke: "true"
            use_zigbuild: "false"
            cargo_features: "vector local-embeddings"
          - runner: windows-2022
            rust_target: x86_64-pc-windows-msvc
            build_target: x86_64-pc-windows-msvc
            binary_name: sqlite-mcp-rs.exe
            can_smoke: "true"
            use_zigbuild: "false"
            cargo_features: "vector local-embeddings"
          - runner: ubuntu-24.04
            rust_target: x86_64-unknown-linux-gnu
            build_target: x86_64-unknown-linux-gnu.2.28
            binary_name: sqlite-mcp-rs
            can_smoke: "true"
            use_zigbuild: "true"
            cargo_features: "vector local-embeddings"
          - runner: ubuntu-24.04-arm
            rust_target: aarch64-unknown-linux-gnu
            build_target: aarch64-unknown-linux-gnu.2.28
            binary_name: sqlite-mcp-rs
            can_smoke: "true"
            use_zigbuild: "true"
            cargo_features: "vector local-embeddings"
          - runner: ubuntu-24.04
            rust_target: x86_64-unknown-linux-musl
            build_target: x86_64-unknown-linux-musl
            binary_name: sqlite-mcp-rs
            can_smoke: "true"
            use_zigbuild: "true"
            cargo_features: "vector"
          - runner: ubuntu-24.04-arm
            rust_target: aarch64-unknown-linux-musl
            build_target: aarch64-unknown-linux-musl
            binary_name: sqlite-mcp-rs
            can_smoke: "true"
            use_zigbuild: "true"
            cargo_features: "vector"
    runs-on: ${{ matrix.runner }}
    env:
      CFLAGS: -Du_int8_t=uint8_t -Du_int16_t=uint16_t -Du_int64_t=uint64_t
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Zig
        if: ${{ matrix.use_zigbuild == 'true' }}
        shell: bash
        run: |
          set -euo pipefail

          case "$(uname -m)" in
            x86_64) zig_platform_key="x86_64-linux" ;;
            aarch64|arm64) zig_platform_key="aarch64-linux" ;;
            *)
              echo "Unsupported runner architecture: $(uname -m)"
              exit 1
              ;;
          esac

          zig_dir="$RUNNER_TEMP/zig-${ZIG_VERSION}-${zig_platform_key}"
          archive="$RUNNER_TEMP/zig.tar.xz"
          index_json="$RUNNER_TEMP/zig-index.json"

          curl --fail --location --silent --show-error \
            "https://ziglang.org/download/index.json" \
            --output "$index_json"

          url=$(python - <<'PY'
          import json
          import os
          import sys

          with open(os.environ["ZIG_INDEX_JSON"], "r", encoding="utf-8") as handle:
              index = json.load(handle)

          version = os.environ["ZIG_VERSION"]
          platform_key = os.environ["ZIG_PLATFORM_KEY"]

          try:
              print(index[version][platform_key]["tarball"])
          except KeyError as exc:
              raise SystemExit(f"missing Zig download metadata for {version} {platform_key}: {exc}")
          PY
          )

          curl --fail --location --silent --show-error "$url" --output "$archive"
          rm -rf "$zig_dir"
          extracted_dir=$(python - <<'PY'
          import os
          import tarfile

          archive_path = os.environ["ZIG_ARCHIVE"]
          with tarfile.open(archive_path, "r:xz") as archive:
              first_name = archive.getnames()[0]

          print(first_name.split("/", 1)[0])
          PY
          )
          tar -xJf "$archive" -C "$RUNNER_TEMP"
          mv "$RUNNER_TEMP/$extracted_dir" "$zig_dir"
          echo "$zig_dir" >> "$GITHUB_PATH"
          "$zig_dir/zig" version
        env:
          ZIG_ARCHIVE: ${{ runner.temp }}/zig.tar.xz
          ZIG_INDEX_JSON: ${{ runner.temp }}/zig-index.json
          ZIG_VERSION: ${{ env.ZIG_VERSION }}
          ZIG_PLATFORM_KEY: ${{ startsWith(matrix.rust_target, 'aarch64-') && 'aarch64-linux' || 'x86_64-linux' }}

      - name: Install cargo-zigbuild
        if: ${{ matrix.use_zigbuild == 'true' }}
        uses: taiki-e/install-action@cargo-zigbuild

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build binary
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ matrix.use_zigbuild }}" = "true" ]; then
            cargo zigbuild --locked --release --features "${{ matrix.cargo_features }}" --target ${{ matrix.build_target }}
          else
            cargo build --locked --release --features "${{ matrix.cargo_features }}" --target ${{ matrix.rust_target }}
          fi

      - name: Smoke test binary
        if: ${{ matrix.can_smoke == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          "./target/${{ matrix.rust_target }}/release/${{ matrix.binary_name }}" --help >/dev/null
      - name: Verify GNU glibc baseline
        if: ${{ endsWith(matrix.rust_target, '-gnu') }}
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm \
            --volume "$PWD:$PWD:ro" \
            --workdir "$PWD" \
            rockylinux:8 \
            "$PWD/target/${{ matrix.rust_target }}/release/${{ matrix.binary_name }}" \
            --help >/dev/null


      - name: Package archive
        shell: bash
        run: |
          set -euo pipefail
          python scripts/package_release.py \
            --target-triple "${{ matrix.rust_target }}" \
            --binary "./target/${{ matrix.rust_target }}/release/${{ matrix.binary_name }}" \
            --output-dir release

      - name: Upload packaged archive
        uses: actions/upload-artifact@v6
        with:
          name: release-${{ matrix.rust_target }}
          path: release/*

  package-npm:
    needs:
      - version
      - build-release-artifacts
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - name: Install pinned npm
        run: npm install --global npm@12.0.1


      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Download release archives
        uses: actions/download-artifact@v7
        with:
          pattern: release-*
          path: release
          merge-multiple: true

      - name: Build npm tarballs
        shell: bash
        run: |
          set -euo pipefail
          python scripts/build_npm_packages.py \
            --version "${{ needs.version.outputs.version }}" \
            --artifacts-dir release \
            --output-dir npm-dist

      - name: Upload npm tarballs
        uses: actions/upload-artifact@v6
        with:
          name: npm-dist
          path: npm-dist/*

  smoke-gnu-model:
    needs:
      - package-npm
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: ubuntu-24.04
            rust_target: x86_64-unknown-linux-gnu
          - arch: arm64
            runner: ubuntu-24.04-arm
            rust_target: aarch64-unknown-linux-gnu
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install pinned npm
        run: npm install --global npm@12.0.1

      - name: Download npm tarballs
        uses: actions/download-artifact@v7
        with:
          name: npm-dist
          path: npm-dist

      - name: Extract GNU payload
        shell: bash
        run: |
          set -euo pipefail
          PLATFORM_TARBALL=$(node -e 'const fs=require("fs"); const manifest=JSON.parse(fs.readFileSync("npm-dist/manifest.json","utf8")); const platform=`linux-${process.argv[1]}-gnu`; const entry=manifest.platform_packages.find((item)=>item.platform===platform); if(!entry){process.exit(1)} console.log(entry.path);' "${{ matrix.arch }}")
          mkdir -p "$GITHUB_WORKSPACE/.tmp/npm-gnu-${{ matrix.arch }}"
          tar -xzf "npm-dist/${PLATFORM_TARBALL}" \
            -C "$GITHUB_WORKSPACE/.tmp/npm-gnu-${{ matrix.arch }}"

      - name: Cache local models
        uses: actions/cache@v5
        with:
          path: .inspector-cache
          key: inspector-models-gnu-${{ matrix.arch }}-${{ hashFiles('Cargo.lock') }}

      - name: Run GNU real-model integration
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .tmp .inspector-cache/huggingface
          export SQLITE_EMBEDDING_CACHE_DIR="$PWD/.inspector-cache/huggingface"
          export SQLITE_RERANKER_CACHE_DIR="$PWD/.inspector-cache/huggingface"
          SQLITE_INSPECTOR_VECTOR_MODE=local \
            bash scripts/test-sqlite-mcp-inspector.sh \
              scripts/run-sqlite-mcp-glibc-baseline.sh \
              "$GITHUB_WORKSPACE/.tmp/npm-gnu-${{ matrix.arch }}/package/vendor/${{ matrix.rust_target }}/sqlite-mcp-rs" \
            2>&1 | tee ".tmp/gnu-model-${{ matrix.arch }}.log"

      - name: Upload failure log
        if: ${{ failure() }}
        uses: actions/upload-artifact@v6
        with:
          name: gnu-model-${{ matrix.arch }}-failure-log
          path: .tmp/gnu-model-${{ matrix.arch }}.log
          if-no-files-found: warn
          retention-days: 7

  smoke-npm-native:
    needs:
      - package-npm
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            alias_name: "@bradsjm/sqlite-mcp-rs-darwin-arm64"
            secondary_alias_name: ""
            expected_target: aarch64-apple-darwin
          - runner: macos-15-intel
            alias_name: "@bradsjm/sqlite-mcp-rs-darwin-x64"
            secondary_alias_name: ""
            expected_target: x86_64-apple-darwin
          - runner: windows-2022
            alias_name: "@bradsjm/sqlite-mcp-rs-win32-x64"
            secondary_alias_name: ""
            expected_target: x86_64-pc-windows-msvc
          - runner: ubuntu-24.04
            alias_name: "@bradsjm/sqlite-mcp-rs-linux-x64-gnu"
            secondary_alias_name: "@bradsjm/sqlite-mcp-rs-linux-x64-musl"
            expected_target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            alias_name: "@bradsjm/sqlite-mcp-rs-linux-arm64-gnu"
            secondary_alias_name: "@bradsjm/sqlite-mcp-rs-linux-arm64-musl"
            expected_target: aarch64-unknown-linux-gnu
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install pinned npm
        run: npm install --global npm@12.0.1

      - name: Download npm tarballs
        uses: actions/download-artifact@v7
        with:
          name: npm-dist
          path: npm-dist

      - name: Resolve tarball names
        shell: bash
        run: |
          set -euo pipefail
          META_TARBALL=$(node -e 'const fs=require("fs"); const manifest=JSON.parse(fs.readFileSync("npm-dist/manifest.json","utf8")); console.log(manifest.meta_package.path);')
          PLATFORM_TARBALL=$(node -e 'const fs=require("fs"); const manifest=JSON.parse(fs.readFileSync("npm-dist/manifest.json","utf8")); const entry=manifest.platform_packages.find((item)=>item.alias_name===process.argv[1]); if(!entry){process.exit(1)} console.log(entry.path);' "${{ matrix.alias_name }}")
          echo "META_TARBALL=$META_TARBALL" >> "$GITHUB_ENV"
          echo "PLATFORM_TARBALL=$PLATFORM_TARBALL" >> "$GITHUB_ENV"
          echo "ALIAS_NAME=${{ matrix.alias_name }}" >> "$GITHUB_ENV"
          echo "SECONDARY_ALIAS_NAME=${{ matrix.secondary_alias_name }}" >> "$GITHUB_ENV"
          echo "EXPECTED_TARGET=${{ matrix.expected_target }}" >> "$GITHUB_ENV"
          if [ -n "${{ matrix.secondary_alias_name }}" ]; then
            SECONDARY_TARBALL=$(node -e 'const fs=require("fs"); const manifest=JSON.parse(fs.readFileSync("npm-dist/manifest.json","utf8")); const entry=manifest.platform_packages.find((item)=>item.alias_name===process.argv[1]); if(!entry){process.exit(1)} console.log(entry.path);' "${{ matrix.secondary_alias_name }}")
            echo "SECONDARY_TARBALL=$SECONDARY_TARBALL" >> "$GITHUB_ENV"
          fi

      - name: Run npm smoke test
        shell: bash
        run: |
          set -euo pipefail
          mkdir smoke
          cd smoke
          npm init -y >/dev/null 2>&1
          npm install "../npm-dist/${META_TARBALL}" >/dev/null
          mkdir -p "node_modules/${ALIAS_NAME}"
          tar -xzf "../npm-dist/${PLATFORM_TARBALL}" -C "node_modules/${ALIAS_NAME}" --strip-components=1
          if [ -n "${SECONDARY_ALIAS_NAME}" ]; then
            mkdir -p "node_modules/${SECONDARY_ALIAS_NAME}"
            tar -xzf "../npm-dist/${SECONDARY_TARBALL}" -C "node_modules/${SECONDARY_ALIAS_NAME}" --strip-components=1
          fi
          node -e 'const {resolvePlatform}=require("@bradsjm/sqlite-mcp-rs/lib/platform"); const actual=resolvePlatform().targetTriple; if(actual!==process.argv[1]){throw new Error(`expected ${process.argv[1]}, got ${actual}`)}' "$EXPECTED_TARGET"
          npx --no-install sqlite-mcp-rs --help >/dev/null

  smoke-npm-musl:
    needs:
      - package-npm
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            cpu: x64
            gnu_alias: "@bradsjm/sqlite-mcp-rs-linux-x64-gnu"
            musl_alias: "@bradsjm/sqlite-mcp-rs-linux-x64-musl"
            expected_target: x86_64-unknown-linux-musl
          - runner: ubuntu-24.04-arm
            cpu: arm64
            gnu_alias: "@bradsjm/sqlite-mcp-rs-linux-arm64-gnu"
            musl_alias: "@bradsjm/sqlite-mcp-rs-linux-arm64-musl"
            expected_target: aarch64-unknown-linux-musl
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Download npm tarballs
        uses: actions/download-artifact@v7
        with:
          name: npm-dist
          path: npm-dist

      - name: Run npm smoke test in Alpine
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm \
            --volume "$PWD:/workspace:ro" \
            --env GNU_ALIAS="${{ matrix.gnu_alias }}" \
            --env MUSL_ALIAS="${{ matrix.musl_alias }}" \
            --env EXPECTED_TARGET="${{ matrix.expected_target }}" \
            node:24-alpine \
            sh -euc '
              npm install --global npm@12.0.1 >/dev/null
              META_TARBALL=$(node -e '"'"'const fs=require("fs"); const manifest=JSON.parse(fs.readFileSync("/workspace/npm-dist/manifest.json","utf8")); console.log(manifest.meta_package.path);'"'"')
              GNU_TARBALL=$(node -e '"'"'const fs=require("fs"); const manifest=JSON.parse(fs.readFileSync("/workspace/npm-dist/manifest.json","utf8")); const entry=manifest.platform_packages.find((item)=>item.alias_name===process.argv[1]); if(!entry){process.exit(1)} console.log(entry.path);'"'"' "$GNU_ALIAS")
              MUSL_TARBALL=$(node -e '"'"'const fs=require("fs"); const manifest=JSON.parse(fs.readFileSync("/workspace/npm-dist/manifest.json","utf8")); const entry=manifest.platform_packages.find((item)=>item.alias_name===process.argv[1]); if(!entry){process.exit(1)} console.log(entry.path);'"'"' "$MUSL_ALIAS")
              mkdir /tmp/smoke
              cd /tmp/smoke
              npm init -y >/dev/null 2>&1
              npm install "/workspace/npm-dist/${META_TARBALL}" >/dev/null
              mkdir -p "node_modules/${GNU_ALIAS}" "node_modules/${MUSL_ALIAS}"
              tar -xzf "/workspace/npm-dist/${GNU_TARBALL}" -C "node_modules/${GNU_ALIAS}" --strip-components=1
              tar -xzf "/workspace/npm-dist/${MUSL_TARBALL}" -C "node_modules/${MUSL_ALIAS}" --strip-components=1
              node -e '"'"'const {resolvePlatform}=require("@bradsjm/sqlite-mcp-rs/lib/platform"); const actual=resolvePlatform().targetTriple; if(actual!==process.argv[1]){throw new Error(`expected ${process.argv[1]}, got ${actual}`)}'"'"' "$EXPECTED_TARGET"
              npx --no-install sqlite-mcp-rs --help >/dev/null
            '

  publish:
    needs:
      - version
      - build-release-artifacts
      - package-npm
      - smoke-npm-native
      - smoke-npm-musl
      - smoke-gnu-model
    runs-on: ubuntu-24.04
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Download release archives
        uses: actions/download-artifact@v7
        with:
          pattern: release-*
          path: release
          merge-multiple: true

      - name: Download npm tarballs
        uses: actions/download-artifact@v7
        with:
          name: npm-dist
          path: npm-dist

      - name: Write checksums
        shell: bash
        run: |
          set -euo pipefail
          python scripts/write_checksums.py --dist-dir release

      - name: Verify expected release files
        shell: bash
        run: |
          set -euo pipefail
          for path in \
            release/sqlite-mcp-rs-aarch64-apple-darwin.tar.xz \
            release/sqlite-mcp-rs-x86_64-apple-darwin.tar.xz \
            release/sqlite-mcp-rs-x86_64-pc-windows-msvc.zip \
            release/sqlite-mcp-rs-x86_64-unknown-linux-gnu.tar.xz \
            release/sqlite-mcp-rs-aarch64-unknown-linux-gnu.tar.xz \
            release/sqlite-mcp-rs-x86_64-unknown-linux-musl.tar.xz \
            release/sqlite-mcp-rs-aarch64-unknown-linux-musl.tar.xz \
            release/sha256.sum; do
            [ -f "$path" ] || { echo "Missing expected release file: $path"; exit 1; }
          done

      - name: Write release notes
        shell: bash
        run: |
          set -euo pipefail
          cat > release-notes.md <<EOF
          ${APP_NAME} ${{ needs.version.outputs.version }}

          Supported binaries:
          - macOS: Apple Silicon and Intel
          - Windows: x64
          - Linux GNU: x64 and arm64 (glibc >= 2.28; vector tools and local embedding/reranking enabled)
          - Linux musl: x64 and arm64 (vector tools enabled; local embedding/reranking unavailable)

          Docker images:
          - linux/amd64 (glibc runtime with local embeddings)
          - linux/arm64 (glibc runtime with local embeddings)
          EOF

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - name: Install pinned npm
        run: npm install --global npm@12.0.1


      - name: Publish npm packages
        shell: bash
        run: |
          set -euo pipefail
          node - <<'NODE'
          const fs = require("fs");
          const { spawnSync } = require("child_process");
          const manifest = JSON.parse(fs.readFileSync("npm-dist/manifest.json", "utf8"));
          const packages = [
            ...manifest.platform_packages.map((entry) => ({
              name: "@bradsjm/sqlite-mcp-rs",
              version: "${{ needs.version.outputs.version }}-" + entry.platform,
              tarball: entry.path,
            })),
            {
              name: manifest.meta_package.name,
              version: "${{ needs.version.outputs.version }}",
              tarball: manifest.meta_package.path,
            },
          ];

          function packageVersionExists(name, version) {
            const packageSpec = `${name}@${version}`;
            const result = spawnSync("npm", ["view", packageSpec, "version", "--json"], {
              encoding: "utf8",
            });

            if (result.status === 0) {
              return true;
            }

            const output = `${result.stdout ?? ""}\n${result.stderr ?? ""}`;
            if (
              output.includes("E404") ||
              output.includes("404 Not Found") ||
              output.includes("No match found for version")
            ) {
              return false;
            }

            process.stderr.write(output);
            throw new Error(`failed to check whether ${packageSpec} already exists on npm`);
          }

          for (const pkg of packages) {
            if (packageVersionExists(pkg.name, pkg.version)) {
              console.log(`Skipping already published npm package ${pkg.name}@${pkg.version}`);
              continue;
            }

            const result = spawnSync("npm", ["publish", "--access", "public", "--provenance", "--tag", "latest", `./npm-dist/${pkg.tarball}`], {
              stdio: "inherit",
            });
            if (result.status !== 0) {
              process.exit(result.status ?? 1);
            }
          }
          NODE

      - name: Create GitHub release
        shell: bash
        run: |
          set -euo pipefail
          gh release create "${{ needs.version.outputs.tag }}" \
            --target "${{ github.sha }}" \
            --title "${{ needs.version.outputs.tag }}" \
            --notes-file release-notes.md \
            release/*
