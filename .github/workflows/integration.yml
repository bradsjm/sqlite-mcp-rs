name: SQLite Integration Tests

on:
  workflow_dispatch:

jobs:
  sqlite-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run MCP inspector integration tests
        run: bash scripts/test-sqlite-mcp-inspector.sh cargo run --
